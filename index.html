<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <!-- Bewusst OHNE viewport-fit=cover: Die System-Insets (Status-/Gesten-
         leiste, Tastatur) verwaltet auf Android die native Seite (MainActivity
         paddet den WebView-Inhalt per Insets-Listener) -- env(safe-area-inset-*)
         liefert in der Android-WebView ohnehin konstant 0px und wird im
         Frontend nirgends verwendet. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BR-Log</title>
    <!-- Theme VOR dem ersten Paint setzen -> kein Flackern (FOUC). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("br-log-theme") || "system";
          var dark =
            t === "dark" ||
            (t === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          var root = document.documentElement;
          if (dark) root.classList.add("dark");
          root.style.backgroundColor = dark ? "#0f172a" : "#f8fafc";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
