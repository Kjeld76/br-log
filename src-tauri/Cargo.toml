[package]
name = "br-zeiten"
version = "1.0.0"
description = "Betriebsrats-Zeiterfassung"
authors = ["Mario König <kontakt@koenig-mario.de>"]
license = "UNLICENSED"
edition = "2021"

[lib]
name = "br_zeiten_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-sql = { version = "2", features = ["sqlite"] }
tauri-plugin-dialog = "2"
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
